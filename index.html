<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>按揭跟单 · 全流程看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Microsoft YaHei',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef2f5;padding:20px;}
.dashboard{max-width:1800px;margin:0 auto;}

/* ─── 头部 ─── */
.header{background:linear-gradient(135deg,#166534 0%,#0a3b2a 100%);border-radius:24px;padding:20px 28px;margin-bottom:22px;color:#fff;box-shadow:0 8px 20px rgba(0,0,0,.09);}
.header h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.header h1 small{font-size:13px;font-weight:400;background:rgba(255,255,255,.2);padding:3px 12px;border-radius:40px;margin-left:10px;}
.gen-time{font-size:11px;opacity:.6;margin-top:4px;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:14px;}
.btn{background:rgba(255,255,255,.16);border:none;color:#fff;padding:5px 14px;border-radius:30px;font-size:12.5px;cursor:pointer;font-weight:500;transition:all .2s;}
.btn:hover{background:rgba(255,255,255,.28);transform:translateY(-1px);}
.btn.active{background:#f59e0b;color:#1a2e1a;font-weight:700;}
.search-box{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 14px;border-radius:30px;font-size:12.5px;outline:none;width:200px;}
.search-box::placeholder{color:rgba(255,255,255,.55);}

/* ─── 统计卡片 ─── */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.stat-card{background:#fff;border-radius:18px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;min-width:130px;flex:1;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;transition:all .2s;border:1.5px solid #f0f2f5;}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1);background:#fefce8;}
.stat-card h4{font-size:11.5px;color:#6b7280;margin-bottom:5px;}
.stat-num{font-size:26px;font-weight:800;color:#166534;}
.stat-icon{font-size:30px;opacity:.7;}

/* ─── 流程泳道 - 大节点卡片包小节点卡片（常显，无需展开）── */
.swimlane-wrap{margin-bottom:20px;overflow-x:auto;padding:4px 0 8px;}
.swimlane{display:flex;gap:6px;flex-wrap:nowrap;align-items:stretch;}
/* 大节点容器：白底大框（参考 nginx/index.html） */
.lane-group{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e5e7eb;min-width:130px;flex:1 1 0;max-width:170px;transition:all .15s;display:flex;flex-direction:column;position:relative;padding:0;overflow:visible;}
.lane-group:hover{box-shadow:0 3px 10px rgba(0,0,0,.08);transform:translateY(-1px);z-index:2;}
/* 大节点之间连接箭头（紧凑） */
.lane-arrow{display:flex;align-items:center;justify-content:center;flex:0 0 8px;min-width:8px;color:#94a3b8;font-size:11px;font-weight:700;user-select:none;align-self:center;line-height:1;}
.lane-arrow::before{content:'▶';}
/* 大节点标题：右指箭头形（左侧斜切、右侧凸出，整体就是一个 ▶ 形状） */
.group-header{position:relative;color:#fff;padding:8px 14px 8px 10px;font-weight:700;font-size:14.5px;text-align:center;letter-spacing:.3px;cursor:pointer;line-height:1.25;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#94a3b8;transition:all .15s;clip-path:polygon(0% 0%, calc(100% - 10px) 0%, 100% 50%, calc(100% - 10px) 100%, 0% 100%, 10px 50%);}
.group-header:hover{filter:brightness(1.08);}
/* 异常 = 红色；有数据 = 蓝色 */
.group-header.warn-bg{background:#dc2626;}
.group-header.normal-bg{background:#2563eb;}
.lane-group.lane-selected{border-color:#2563eb;box-shadow:0 0 0 2px #2563eb, 0 4px 14px rgba(37,99,235,.2);}
.lane-group.lane-selected.lane-warn{border-color:#dc2626;box-shadow:0 0 0 2px #dc2626, 0 4px 14px rgba(220,38,38,.2);}
.group-header .sub{font-weight:600;font-size:10.5px;opacity:.92;display:block;margin-top:2px;letter-spacing:.2px;}
/* 子节点区：在大框内部直接堆叠（参考文件） */
.sub-lanes{display:flex;flex-direction:column;gap:4px;padding:6px;flex:1;background:transparent;border:0;margin:0;}
/* 小节点之间的小箭头（垂直 ▼，紧凑） */
.sub-arrow{flex:0 0 6px;min-height:6px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:8px;font-weight:700;user-select:none;align-self:center;line-height:1;}
.sub-arrow::before{content:'▼';}
.sub-arrow[data-empty='1']{opacity:.3;}
/* 小节点：圆角矩形卡片（保持参考文件的轻量风格） */
.sub-lane{position:relative;background:#f8fafc;padding:5px 6px 4px;border-radius:6px;border:1px solid #e9edf2;transition:all .15s;cursor:default;}
.sub-lane:hover{background:#f1f5f9;border-color:#cbd5e1;}
/* 异常 = 红边红底 */
.sub-lane.sub-warn{background:#fef2f2;border-color:#fca5a5;}
/* 选中态 */
.sub-lane.selected-sub{background:#dbeafe;border-color:#2563eb;}
/* 小节点顶部行：名称（独占一行，不截断，自动换行） */
.sub-lane .sub-header{padding:0 2px 3px;cursor:pointer;font-size:10.5px;font-weight:600;color:#1e293b;line-height:1.3;text-align:center;}
.sub-lane .sub-header .sub-name{display:block;white-space:normal;word-break:break-all;line-height:1.3;}
/* 异常名称标红 */
.sub-lane.sub-warn .sub-header .sub-name{color:#b91c1c;}
/* 小节点底部统计行：两个胶囊，标题+数量分两行 */
.sub-lane .sub-stats{display:flex;justify-content:space-between;gap:3px;font-size:10px;margin-top:3px;}
.sub-lane .sub-stats span{cursor:pointer;padding:2px 4px;border-radius:6px;background:#f1f5f9;color:#475569;flex:1;text-align:center;transition:all .15s;user-select:none;line-height:1.2;font-weight:600;}
.sub-lane .sub-stats span:hover{background:#e2e8f0;}
.sub-lane .sub-stats .active-stat{background:#2563eb;color:#fff;font-weight:700;}
.sub-lane .sub-stats .warn-stat{background:#fee2e2;color:#b91c1c;font-weight:700;}
.sub-lane .sub-stats .warn-stat:hover{background:#fecaca;}
.sub-lane .sub-stats .warn-active{background:#dc2626;color:#fff;font-weight:700;}
/* 无异常时的 ⚠ 胶囊（灰色） */
.sub-lane .sub-stats .empty-stat{background:#f1f5f9;color:#9ca3af;cursor:default;}
.sub-lane .sub-stats .empty-stat:hover{background:#f1f5f9;}

/* ─── 主表格 ─── */
.section-title{font-size:14px;font-weight:700;color:#1f2937;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.table-wrap{background:#fff;border-radius:20px;overflow:auto;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #edf2f7;margin-bottom:24px;overflow-x:auto;max-height:calc(100vh - 280px);}
.data-table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px;position:sticky;top:0;}
.data-table thead{position:sticky;top:0;z-index:10;}
.data-table th{background:#f9fbfd;font-weight:700;color:#374151;padding:10px 11px;border-bottom:2px solid #e5e7eb;white-space:nowrap;position:sticky;top:0;z-index:2;font-size:11.5px;text-align:center;}
.data-table td{padding:9px 11px;border-bottom:1px solid #f0f4f8;vertical-align:middle;text-align:center;}
.data-table td.cell-left{text-align:left;}
.data-table td ul.warn-list{text-align:left;}
.data-table tbody tr:hover{background:#fefce8;}
.data-table tbody tr.warn-row{background:#fff9f9;}
.data-table tbody tr.warn-row:hover{background:#fff0ee;}

/* ─── 流程进度条 ─── */
.progress-track{display:flex;align-items:center;gap:0;width:100%;min-width:420px;}
.prog-step{flex:1;text-align:center;position:relative;}
.prog-dot{width:11px;height:11px;border-radius:50%;margin:0 auto 2px;border:2px solid #d1d5db;background:#fff;}
.prog-dot.done{background:#166534;border-color:#166534;}
.prog-dot.current{background:#f59e0b;border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.25);}
.prog-dot.warn{background:#dc2626;border-color:#dc2626;box-shadow:0 0 0 3px rgba(220,38,38,.2);}
.prog-label{font-size:9px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px;display:block;margin:0 auto;}
.prog-label.current-lbl{color:#b45309;font-weight:700;}
.prog-label.warn-lbl{color:#dc2626;font-weight:700;}
.prog-connector{position:absolute;top:4px;left:50%;right:-50%;height:2px;background:#e5e7eb;z-index:0;}
.prog-connector.done{background:#166534;}

/* ─── 标签 ─── */
.tag{border-radius:20px;padding:2px 8px;display:inline-block;font-size:11px;font-weight:600;}
.tag-ok{background:#e8f5e9;color:#2e6b3e;}
.tag-warn{background:#fff3e0;color:#b45309;}
.tag-danger{background:#ffebee;color:#c62828;}
.tag-info{background:#e3f2fd;color:#0b5e7e;}
.tag-lt2{background:#fce4ec;color:#880e4f;}
.tag-lt5{background:#fff8e1;color:#e65100;}
.tag-gray{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;}

.warn-list{list-style:none;margin:0;padding:0;}
.warn-list li{margin:2px 0;font-size:11px;color:#b91c1c;line-height:1.4;}
.warn-list li.warn-timeout{background:linear-gradient(90deg,#fff7ed 0%,#fef3c7 100%);border-left:3px solid #f59e0b;padding:6px 8px;margin:4px 0;border-radius:4px;color:#78350f;}
.warn-rule-id{display:inline-block;background:#dc2626;color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700;margin-right:4px;}
.warn-overdue{color:#dc2626;font-weight:700;}
.warn-owner{display:inline-block;margin-right:8px;color:#1e40af;}
.warn-resolve{color:#4b5563;font-size:10.5px;}
.order-link{color:#1e6f9f;text-decoration:none;font-weight:600;font-size:12px;}
.order-link:hover{text-decoration:underline;}
.elapsed-badge{font-size:11px;color:#6b7280;}
.elapsed-badge.slow{color:#dc2626;font-weight:700;}

.summary-bar{font-size:12.5px;color:#374151;background:#f1f5f9;padding:6px 16px;border-radius:30px;display:inline-block;margin-bottom:14px;}
.empty-state{text-align:center;padding:40px;color:#9ca3af;}

/* ─── 列控制 ─── */
.col-panel{background:#fff;border-radius:16px;padding:10px 18px;margin-bottom:14px;display:none;flex-wrap:wrap;gap:8px;align-items:center;border:1px solid #e5e7eb;}
.col-tag{background:#f8fafc;border:1px solid #cbd5e1;padding:3px 10px;border-radius:20px;font-size:11.5px;cursor:pointer;color:#1e293b;font-weight:500;transition:all .15s;}
.col-tag:hover{background:#e2e8f0;}
.col-tag.off{background:#fee2e2;border-color:#f87171;color:#991b1b;text-decoration:line-through;opacity:.8;}

/* ─── 分组标题行 ─── */
.group-header-row td{background:#f0fdf4;color:#166534;font-weight:700;font-size:12px;padding:7px 11px;border-bottom:1.5px solid #bbf7d0;}
</style>
</head>

// Item 精确匹配：RAW_DATA 的 item 必须与规则 item 完全相等才匹配
//  2025-06-23 修复：去掉 substring 包含逻辑，避免 "资金监管" 错误匹配 "资金监管发放"
function itemMatches(ruleItem, itemKw) {
  if (!ruleItem || !itemKw) return false;
  return ruleItem === itemKw;
}

// 返回该单子在本大节点规则下命中的所有 item（去重后）
//  命中 = node_items 中存在 item 与规则中任一 item 完全相等（itemMatches）
function rowHitItems(row, ruleItems) {
  const nodeItems = row.node_items || [];
  const hit = new Set();
  nodeItems.forEach(it => {
    ruleItems.forEach(r => {
      if (itemMatches(r, it)) hit.add(it);   // 命中：记录 RAW_DATA 真实 item 名
    });
  });
  return hit;
}

// ============================================================
//  归属判定（多归属 + order_no 去重）
//  ──────────────────────────────────────────────────────────
//  一单可同时归属多个大节点（多归属），但汇总严格按 order_no 去重：
//    · 大节点汇总  = 该大节点下命中过的成交单（去重 order_no）
//    · 子项汇总    = 在大节点下命中、且 node_items 命中该规则 item 的成交单（去重 order_no）
//    · 不变式     = 大节点汇总  ≡  子项 order_no 并集去重
//
//  命中（多归属）：单子 r 属于大节点 stageId
//    ⇔  r.node_items 存在 itemKw，与 STAGE_ITEM_RULES[stageId] 规则中任一 item 匹配
//  （不依赖 current_stage_id / item_styles，避免"current 命中但无规则子项"的孤立单
//    导致大节点汇总 > 子项之和。）
// ============================================================
function belongsToStage(row, stageId) {
  const rules = STAGE_ITEM_RULES[stageId];
  if (!rules) return false;
  const nodeItems = row.node_items || [];
  for (let i = 0; i < nodeItems.length; i++) {
    for (let j = 0; j < rules.length; j++) {
      if (itemMatches(rules[j], nodeItems[i])) return true;
    }
  }
  return false;
}

// ============================================================
//  核心逻辑：从 RAW_DATA 自动聚合每个大节点的统计 + 子项
//  ──────────────────────────────────────────────────────────
//  命中规则（统一）：单子 r 属于大节点 stageId
//    ⇔  r.current_stage_id === stageId
//     OR r.node_items 中存在 item，与 STAGE_ITEM_RULES[stageId] 规则中任一 item 匹配
//
//  大节点汇总 = 在 stageId 下命中（去重后）的成交单数 + 异常数
//  子项聚合   = 在 stageId 下命中、且 node_items 命中该规则 item 的成交单数
//  （所有数字都从 RAW_DATA 实时算出，不再硬编码）
// ============================================================
// belongsToStage / rowHitItems / itemMatches 见上方 STAGE_ITEM_RULES 区域

// 返回 [{ stageId, total, warn, subItems:[{item, cnt, warn, ruleItem}] }]
// 按 FLOW_STAGES 顺序输出；subItems 按 STAGE_ITEM_RULES 中规则的顺序稳定展示
//
// 关键去重规则（多归属 + order_no 去重）：
//   · 大节点 total  = 命中该 stageId 的成交单数（Map<order_no> 去重）
//   · 大节点 warn   = 命中且 has_warning 的单子数（按 order_no 去重）
//   · 子项 cnt      = 命中、且 node_items 命中该规则 item 的成交单数（按 order_no 去重）
//   · 子项 warn     = 命中、且 has_warning、且 node_items 命中该规则 item 的成交单数（按 order_no 去重）
//   不变式：total = 子项 order_no 并集去重大小
function buildStageStats() {
  const out = [];
  FLOW_STAGES.forEach(s => {
    const stageId  = s.id;
    const rules    = STAGE_ITEM_RULES[stageId] || [];
    // 命中该大节点的所有成交单（按 order_no 去重：同一单可能被多次命中）
    const seenOrder = new Map();
    const stageRows = [];
    for (let i = 0; i < RAW_DATA.length; i++) {
      const r = RAW_DATA[i];
      if (belongsToStage(r, stageId) && !seenOrder.has(r.order_no)) {
        seenOrder.set(r.order_no, true);
        stageRows.push(r);
      }
    }
    const total = stageRows.length;
    const warn  = stageRows.filter(r => r.has_warning).length;
    // 子项聚合：按 STAGE_ITEM_RULES 中的规则顺序扫描
    // 对每条规则 itemRule，统计 node_items 中能匹配 itemRule 的成交单数（按 order_no 去重）
    const subItems = rules.map(ruleItem => {
      const cntSet  = new Set();
      const warnSet = new Set();
      stageRows.forEach(r => {
        const nodeItems = r.node_items || [];
        let matched = false;
        for (let i = 0; i < nodeItems.length; i++) {
          if (itemMatches(ruleItem, nodeItems[i])) { matched = true; break; }
        }
        if (matched) {
          cntSet.add(r.order_no);
          if (r.has_warning) warnSet.add(r.order_no);
        }
      });
      return { item: ruleItem, cnt: cntSet.size, warn: warnSet.size };
    }).filter(it => it.cnt > 0); // 只展示"实际有数据"的子项（避免空子项卡片）
    out.push({ stageId, total, warn, subItems });
  });
  return out;
}

// 返回 [{ stageId, total, warn, subItems:[{item, cnt, warn}] }]
// 按 FLOW_STAGES 顺序输出；subItems 按 cnt 降序稳定展示
//
// 关键去重规则：
//   · 大节点 total  = 命中该 stageId 的成交单数（每单一记）
//   · 大节点 warn   = 命中且 has_warning 的单子数
//   · 子项 cnt      = 命中、且 node_items 命中该规则 item 的成交单数
//   · 子项 warn     = 命中、且 has_warning、且 node_items 命中该规则 item 的成交单数
//
// 大节点 / 子项 命中判定（供筛选使用）
function rowMatchesGroup(row, stageId) {
  return belongsToStage(row, stageId);
}
function rowMatchesSub(row, stageId, itemKw) {
  if (!belongsToStage(row, stageId)) return false;
  const rules = STAGE_ITEM_RULES[stageId] || [];
  const nodeItems = row.node_items || [];
  for (let i = 0; i < nodeItems.length; i++) {
    for (let j = 0; j < rules.length; j++) {
      if (itemMatches(rules[j], nodeItems[i]) && rules[j] === itemKw) return true;
    }
  }
  return false;
}

// ============================================================
//  筛选
// ============================================================
function getFiltered() {
  let data = RAW_DATA;
  if (gFilter === 'warn')   data = data.filter(r => r.has_warning);
  else if (gFilter === 'progress') {
    if (currentStageFilter) {
      // 节点作用域：该大节点下命中 + 有任一节点异常（进度/偏慢/超时）
      data = data.filter(r => rowMatchesGroup(r, currentStageFilter) && (r.has_progress_warn || (r.warn_types && r.warn_types.includes('slow')) || r.has_timeout_warn));
    } else {
      // 全局：所有节点异常单（进度类 + 偏慢 + 超时）
      data = data.filter(r => r.has_progress_warn || (r.warn_types && r.warn_types.includes('slow')) || r.has_timeout_warn);
    }
  }
  else if (gFilter === 'lt2') data = data.filter(r => r.cert_code === '2');
  else if (gFilter === 'lt5') data = data.filter(r => r.cert_code === '3');
  else if (gFilter === 'land') data = data.filter(r => r.warn_types && r.warn_types.includes('land'));
  // 子节点筛选（item 严格匹配 + stageId 锁定 + 大节点命中）
  if (subNodeFilter) {
    const kw = subNodeFilter.kw;
    const sid = subNodeFilter.stageId;
    const warnOnly = subNodeFilter.warnOnly || false;
    data = data.filter(r => rowMatchesSub(r, sid, kw));
    if (warnOnly) {
      data = data.filter(r => r.has_warning);
    }
  } else if (currentStageFilter) {
    // 大节点筛选 = 在该大节点规则下命中（多归属 + order_no 去重）
    data = data.filter(r => rowMatchesGroup(r, currentStageFilter));
    if (currentStageWarnOnly) {
      data = data.filter(r => r.has_warning);
    }
  }
  if (gSearch) {
    const q = gSearch.toLowerCase();
    data = data.filter(r =>
      (r.order_no||'').toLowerCase().includes(q) ||
      (r.property||'').toLowerCase().includes(q) ||
      (r.loan_staff||'').toLowerCase().includes(q) ||
      (r.cert_staff||'').toLowerCase().includes(q) ||
      (r.master||'').toLowerCase().includes(q)
    );
  }
  // 按 order_no 去重：RAW_DATA 中可能有同 order_no 多次出现（一个成交单的多个快照/事项）
  // 这里用 Map 保留首次出现的 row
  const seenOrder = new Map();
  const dedup = [];
  for (let i = 0; i < data.length; i++) {
    const k = data[i].order_no;
    if (!seenOrder.has(k)) { seenOrder.set(k, true); dedup.push(data[i]); }
  }
  return dedup;
}

// ============================================================
//  渲染泳道（大节点卡片常显 + 内嵌小节点卡片）
//  ──────────────────────────────────────────────────────────
//  数据全部从 RAW_DATA 实时聚合：
//    · 大节点 cnt/warn  = 该大节点规则下命中（多归属 + order_no 去重）的成交单数 / 异常数
//    · 小节点 cnt/warn  = 在该大节点下、node_items 命中该规则 item 的成交单数（order_no 去重）
//    · 点击大节点 = rowMatchesGroup 命中（多归属 + order_no 去重）
//    · 点击小节点 = rowMatchesSub（+ item 精确匹配 + 大节点命中）
//    · 不变式     = 大节点 cnt  ≡  子项 order_no 并集去重
// ============================================================
let STAGE_STATS_CACHE = []; // 缓存 buildStageStats() 结果（每次刷新重建）

function renderSwimlane() {
  const el = document.getElementById('swimlane');
  STAGE_STATS_CACHE = buildStageStats();   // 实时聚合
  let html = '';
  FLOW_STAGES.forEach((s, idx) => {
    const stageId  = s.id;
    const stats    = STAGE_STATS_CACHE[idx];
    const cnt      = stats.total;
    const warnCnt  = stats.warn;
    const subItems = stats.subItems;
    const esc      = stageId.replace(/'/g, "\'");
    // 选中态：仅大节点筛选（无子项/无仅异常）→ 蓝边
    const isGroupSelected = (currentStageFilter === stageId && !subNodeFilter);
    // 标题色
    let hdrCls = 'group-header';
    if (warnCnt > 0) hdrCls += ' warn-bg';
    else if (cnt > 0) hdrCls += ' normal-bg';
    // 子项渲染
    let subHtml = '';
    if (subItems.length > 0) {
      subItems.forEach((it, subIdx) => {
        const kw   = it.item;
        const subCnt  = it.cnt;
        const subWarn = it.warn;
        const kwEsc = kw.replace(/'/g, "\'");
        const isSubSel   = subNodeFilter && subNodeFilter.stageId === stageId && subNodeFilter.kw === kw && !subNodeFilter.warnOnly;
        const isSubWarn  = subNodeFilter && subNodeFilter.stageId === stageId && subNodeFilter.kw === kw &&  subNodeFilter.warnOnly;
        // 小节点颜色：异常=红边红底、有数据=普通、选中=蓝边蓝底
        let subCls = 'sub-lane';
        if (isSubSel || isSubWarn) subCls += ' selected-sub';
        else if (subWarn > 0) subCls += ' sub-warn';
        // 标题完整显示（不截断）
        subHtml += `<div class="${subCls}">
          <div class="sub-header" onclick="filterBySubNode('${esc}','${kwEsc}',false)" title="点击只看：${kw}">
            <span class="sub-name">${kw}</span>
          </div>
          <div class="sub-stats">
            <span class="${isSubSel ? 'active-stat' : ''}" onclick="filterBySubNode('${esc}','${kwEsc}',false)" title="全部：${subCnt} 单">📋 ${subCnt}</span>
            <span class="${isSubWarn ? 'warn-active' : (subWarn > 0 ? 'warn-stat' : 'empty-stat')}" onclick="filterBySubNode('${esc}','${kwEsc}',true)" title="异常：${subWarn} 单">⚠ ${subWarn}</span>
          </div>
        </div>`;
        // 小节点之间插入小箭头（最后一个不插）
        if (subIdx < subItems.length - 1) {
          subHtml += `<div class="sub-arrow" data-empty="${subCnt === 0 ? 1 : 0}" title="下一项"></div>`;
        }
      });
    } else {
      subHtml = '<div style="font-size:10.5px;color:#9ca3af;text-align:center;padding:8px 0;">暂无子项数据</div>';
    }

    html += `<div class="lane-group${isGroupSelected ? ' lane-selected' : ''}${warnCnt > 0 ? ' lane-warn' : ''}">
      <div class="${hdrCls}" onclick="filterByGroup('${esc}')" title="点击只看：${s.label}（共 ${cnt} 单 / 异常 ${warnCnt}）">
        ${s.label}
        <span class="sub">${cnt} / 异常 ${warnCnt}</span>
      </div>
      <div class="sub-lanes">${subHtml}</div>
    </div>`;
    // 大节点之间插入箭头连接器（最后一个不插）
    if (idx < FLOW_STAGES.length - 1) {
      html += `<div class="lane-arrow" title="下一节点：${FLOW_STAGES[idx+1].label}">▶</div>`;
    }
  });
  el.innerHTML = html;
}

// 点击大节点卡片 → 筛选该大节点规则下命中的所有成交单（多归属 + order_no 去重）
function filterByGroup(stageId) {
  if (currentStageFilter === stageId && !subNodeFilter) {
    // 再次点击 → 取消
    currentStageFilter = null;
    currentStageWarnOnly = false;
    subNodeFilter = null;
  } else {
    currentStageFilter = stageId;
    currentStageWarnOnly = false;
    subNodeFilter = null;
    gFilter = 'all';
  }
  syncBtns();
  renderSwimlane();
  refresh();
}

// 点击子项 → 按子项精确匹配（item + stageId）
function filterBySubNode(stageId, kw, warnOnly) {
  if (subNodeFilter && subNodeFilter.stageId === stageId && subNodeFilter.kw === kw && subNodeFilter.warnOnly === warnOnly) {
    // 再次点击 → 取消
    subNodeFilter = null;
    currentStageFilter = null;
    currentStageWarnOnly = false;
  } else {
    subNodeFilter = { stageId, kw, warnOnly };
    currentStageFilter = stageId;
    currentStageWarnOnly = false;
    gFilter = warnOnly ? 'warn' : 'all';
  }
  syncBtns();
  renderSwimlane();
  refresh();
}

// ============================================================
//  渲染表格
// ============================================================
function renderTable(data) {
  const wrap = document.getElementById('tableWrap');
  if (!data.length) {
    wrap.innerHTML = '<div class="empty-state">📭 暂无匹配数据</div>';
    return;
  }
  const visCols = ALL_COLS.filter(c => colVis[c.id] !== false);

  if (gGroupMode) {
    // 按节点分组
    let html = '';
    const groups = {};
    data.forEach(r => {
      const k = r.current_stage_id || '未识别';
      if (!groups[k]) groups[k] = [];
      groups[k].push(r);
    });
    // 按流程顺序排
    const orderedKeys = [...FLOW_STAGES.map(s => s.id), '未识别'].filter(k => groups[k]);
    orderedKeys.forEach(stageId => {
      const rows   = groups[stageId];
      const stage  = FLOW_STAGES.find(s => s.id === stageId);
      const lbl    = stage ? stage.label : '未识别';
      const wCnt   = rows.filter(r => r.has_warning).length;
      html += `<div class="section-title" style="margin-top:16px;">
        ${lbl} <span class="tag tag-gray">${rows.length} 单</span>
        ${wCnt > 0 ? `<span class="tag tag-danger">${wCnt} 异常</span>` : ''}
        ${stage ? `<span style="font-size:11px;color:#9ca3af;font-weight:400;">${stage.desc}</span>` : ''}
      </div>`;
      html += renderTableHtml(rows, visCols, true);
    });
    wrap.innerHTML = html;
  } else {
    wrap.innerHTML = renderTableHtml(data, visCols, false);
  }
}

function renderTableHtml(data, visCols, isGroup) {
  let html = `<table class="data-table"><thead><tr>`;
  visCols.forEach(c => { html += `<th>${c.label}</th>`; });
  html += `</tr></thead><tbody>`;
  data.forEach(row => {
    const trCls = row.has_warning ? 'warn-row' : '';
    html += `<tr class="${trCls}">`;
    visCols.forEach(c => {
      html += `<td>${renderCell(c.id, row)}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

// ============================================================
//  列控制面板
// ============================================================
function buildColPanel() {
  const panel = document.getElementById('colPanel');
  panel.innerHTML = '<span style="font-size:12px;font-weight:700;color:#374151;background:#f1f5f9;padding:3px 10px;border-radius:20px;">列控制</span>';
  ALL_COLS.forEach(c => {
    const tag = document.createElement('span');
    tag.className = 'col-tag' + (colVis[c.id] === false ? ' off' : '');
    tag.innerText = c.label;
    tag.onclick = () => {
      colVis[c.id] = colVis[c.id] === false ? true : false;
      buildColPanel();
      refresh();
    };
    panel.appendChild(tag);
  });
  const reset = document.createElement('span');
  reset.className = 'col-tag';
  reset.innerText = '↺ 重置';
  reset.style.marginLeft = 'auto';
  reset.onclick = () => { initColVis(); buildColPanel(); refresh(); };
  panel.appendChild(reset);
}

function toggleColPanel() {
  const p = document.getElementById('colPanel');
  p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
}

function toggleGroupMode() {
  gGroupMode = !gGroupMode;
  document.getElementById('btnGroup').classList.toggle('active', gGroupMode);
  refresh();
}

// ============================================================
//  汇总条 + 按钮同步
// ============================================================
function renderSummary(data) {
  const labelMap = {
    all:'全部订单', warn:'异常单', progress:'进度异常', lt2:'不满两年', lt5:'满二不满五',
    land:'土地年限预警', slow:'节点偏慢', timeout:'节点超时'
  };
  let stageTag = '';
  if (subNodeFilter) {
    const tagStyle = subNodeFilter.warnOnly ? 'background:#fee2e2;color:#991b1b;margin-left:6px;' : 'background:#d1fae5;color:#065f46;margin-left:6px;';
    const prefix = subNodeFilter.warnOnly ? '子节点异常：' : '子节点：';
    stageTag = `<span class="tag" style="${tagStyle}">${prefix}${currentStageFilter} / ${subNodeFilter.kw} <a href="javascript:void(0)" onclick="clearStageFilter()" style="margin-left:4px;color:inherit;text-decoration:underline;">清除</a></span>`;
  } else if (currentStageFilter) {
    const tagStyle = currentStageWarnOnly ? 'background:#fee2e2;color:#991b1b;margin-left:6px;' : 'background:#dbeafe;color:#1e40af;margin-left:6px;';
    const prefix = currentStageWarnOnly ? '节点异常：' : '节点：';
    stageTag = `<span class="tag" style="${tagStyle}">${prefix}${currentStageFilter} <a href="javascript:void(0)" onclick="clearStageFilter()" style="margin-left:4px;color:inherit;text-decoration:underline;">清除</a></span>`;
  }
  document.getElementById('summaryBar').innerHTML =
    `📌 当前视图：<strong>${labelMap[gFilter]||gFilter}</strong>${stageTag} | 共 <strong>${data.length}</strong> 条`;
}

function clearStageFilter() {
  currentStageFilter = null;
  currentStageWarnOnly = false;
  subNodeFilter = null;
  renderSwimlane();
  refresh();
}

function syncBtns() {
  [['btnAll','all'],['btnProgress','progress'],['btnWarn','warn'],['btnLt2','lt2'],['btnLt5','lt5']].forEach(([id, f]) => {
    document.getElementById(id).classList.toggle('active', gFilter === f);
  });
}

// ============================================================
//  搜索 + 刷新
// ============================================================
function onSearch() {
  gSearch = document.getElementById('searchBox').value.trim();
  refresh();
}

function refresh() {
  const data = getFiltered();
  renderStats();
  renderSwimlane();
  renderSummary(data);
  renderTable(data);
  syncBtns();
}

// ============================================================
//  初始化
// ============================================================
function init() {
  initColVis();
  buildColPanel();

  document.getElementById('btnAll').onclick       = () => { gFilter='all';       currentStageFilter=null; subNodeFilter=null; syncBtns(); renderSwimlane(); refresh(); };
  document.getElementById('btnProgress').onclick  = () => { gFilter='progress';  currentStageFilter=null; subNodeFilter=null; syncBtns(); renderSwimlane(); refresh(); };
  document.getElementById('btnWarn').onclick      = () => { gFilter='warn';      currentStageFilter=null; subNodeFilter=null; syncBtns(); renderSwimlane(); refresh(); };
  document.getElementById('btnLt2').onclick  = () => { gFilter='lt2';  currentStageFilter=null; subNodeFilter=null; syncBtns(); renderSwimlane(); refresh(); };
  document.getElementById('btnLt5').onclick  = () => { gFilter='lt5';  currentStageFilter=null; subNodeFilter=null; syncBtns(); renderSwimlane(); refresh(); };

  refresh();
}
init();
</script>
